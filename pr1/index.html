<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Практика 1 — карточка товара (LESS)</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="product-card">
  <div class="product-card__image">
    <img src="img/img.png" alt="Товар">
  </div>
  <h3 class="product-card__title">Эгида 2019</h3>
  <p class="product-card__discription">Эгида чемпионов — физический трофей, которым награждаются победители турнира The International. На обратной стороне трофея выгравированы имена и подписи каждого игрока победившей на The International команды в каждый год.</p>
  <div class="product-card__footer">
    <span class="product-card__price">150$</span>
    <a class="product-card__button" href="#">В корзину</a>
  </div>
</div>
